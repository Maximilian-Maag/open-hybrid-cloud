name: CD — Release

on:
  push:
    branches: [dev, staging, main]

permissions:
  contents: write   # create releases and upload assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Compute tags ────────────────────────────────────────────────────────
      - name: Set Docker tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          case "${GITHUB_REF_NAME}" in
            main)
              echo "DOCKER_TAG=latest"             >> "$GITHUB_ENV"
              echo "DOCKER_SHA_TAG=${SHORT_SHA}"   >> "$GITHUB_ENV"
              ;;
            staging)
              echo "DOCKER_TAG=staging"                    >> "$GITHUB_ENV"
              echo "DOCKER_SHA_TAG=staging-${SHORT_SHA}"  >> "$GITHUB_ENV"
              ;;
            dev)
              echo "DOCKER_TAG=dev"                    >> "$GITHUB_ENV"
              echo "DOCKER_SHA_TAG=dev-${SHORT_SHA}"  >> "$GITHUB_ENV"
              ;;
          esac

      # ── CSS ─────────────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Build CSS
        run: npm ci --prefix src && npm run build:css --prefix src

      # ── Go binaries (main only) ──────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server binary (linux/amd64)
        if: github.ref_name == 'main'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/server-linux-amd64 ./src/cmd/server

      - name: Build migrate binary (linux/amd64)
        if: github.ref_name == 'main'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/migrate-linux-amd64 ./src/cmd/migrate

      - name: Build server binary (linux/arm64)
        if: github.ref_name == 'main'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o dist/server-linux-arm64 ./src/cmd/server

      - name: Build migrate binary (linux/arm64)
        if: github.ref_name == 'main'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o dist/migrate-linux-arm64 ./src/cmd/migrate

      # ── Docker image → Docker Hub ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:${{ env.DOCKER_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:${{ env.DOCKER_SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Handbook PDF (main only) ─────────────────────────────────────────────
      - name: Compile handbook (LaTeX)
        if: github.ref_name == 'main'
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3
        with:
          root_file: handbook.tex
          working_directory: docs
          args: -pdf -interaction=nonstopmode -halt-on-error

      # ── GitHub Release (main only) ──────────────────────────────────────────
      - name: Create GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }} (${{ env.SHORT_SHA }})"
          body: |
            ## Commit

            ${{ github.event.head_commit.message }}

            **SHA:** [`${{ env.SHORT_SHA }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ## Docker Image

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:${{ env.SHORT_SHA }}
            # or always-latest:
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:latest
            ```

            ## Binaries

            | File | Platform |
            |------|----------|
            | `server-linux-amd64` | Linux x86-64 (server) |
            | `server-linux-arm64` | Linux ARM64 (server) |
            | `migrate-linux-amd64` | Linux x86-64 (DB migration tool) |
            | `migrate-linux-arm64` | Linux ARM64 (DB migration tool) |

            Run migrations before starting the server for the first time or after an upgrade:
            ```bash
            DATABASE_URL="postgres://..." ./migrate-linux-amd64
            ```
          files: |
            dist/server-linux-amd64
            dist/server-linux-arm64
            dist/migrate-linux-amd64
            dist/migrate-linux-arm64
            docs/handbook.pdf
          draft: false
          prerelease: false
          make_latest: true

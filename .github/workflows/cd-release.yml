name: CD — Release

on:
  push:
    branches: [main]

permissions:
  contents: write   # create releases and upload assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Compute short SHA ───────────────────────────────────────────────────
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      # ── CSS ─────────────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Build CSS
        run: npm ci --prefix src && npm run build:css --prefix src

      # ── Go binaries (linux/amd64 + linux/arm64) ──────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server binary (linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/server-linux-amd64 ./src/cmd/server

      - name: Build migrate binary (linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/migrate-linux-amd64 ./src/cmd/migrate

      - name: Build server binary (linux/arm64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o dist/server-linux-arm64 ./src/cmd/server

      - name: Build migrate binary (linux/arm64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o dist/migrate-linux-arm64 ./src/cmd/migrate

      # ── Docker image → Docker Hub ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Handbook PDF ────────────────────────────────────────────────────────
      - name: Compile handbook (LaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: handbook.tex
          working_directory: docs
          args: -pdf -interaction=nonstopmode -halt-on-error

      # ── GitHub Release ──────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }} (${{ env.SHORT_SHA }})"
          body: |
            ## Commit

            ${{ github.event.head_commit.message }}

            **SHA:** [`${{ env.SHORT_SHA }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ## Docker Image

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:${{ env.SHORT_SHA }}
            # or always-latest:
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud:latest
            ```

            ## Binaries

            | File | Platform |
            |------|----------|
            | `server-linux-amd64` | Linux x86-64 (server) |
            | `server-linux-arm64` | Linux ARM64 (server) |
            | `migrate-linux-amd64` | Linux x86-64 (DB migration tool) |
            | `migrate-linux-arm64` | Linux ARM64 (DB migration tool) |

            Run migrations before starting the server for the first time or after an upgrade:
            ```bash
            DATABASE_URL="postgres://..." ./migrate-linux-amd64
            ```
          files: |
            dist/server-linux-amd64
            dist/server-linux-arm64
            dist/migrate-linux-amd64
            dist/migrate-linux-arm64
            docs/handbook.pdf
          draft: false
          prerelease: false
          make_latest: true

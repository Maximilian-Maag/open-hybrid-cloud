name: CD — Release

on:
  push:
    branches: [dev, staging, main]

permissions:
  contents: read

jobs:
  # ── Compute tags ─────────────────────────────────────────────────────────────
  tags:
    name: Compute tags
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.tags.outputs.short_sha }}
      tag: ${{ steps.tags.outputs.tag }}
      sha-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Set Docker tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          case "${GITHUB_REF_NAME}" in
            main)
              echo "tag=latest"            >> "$GITHUB_OUTPUT"
              echo "sha_tag=${SHORT_SHA}"  >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "tag=staging"                    >> "$GITHUB_OUTPUT"
              echo "sha_tag=staging-${SHORT_SHA}"   >> "$GITHUB_OUTPUT"
              ;;
            dev)
              echo "tag=dev"                        >> "$GITHUB_OUTPUT"
              echo "sha_tag=dev-${SHORT_SHA}"       >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ── Build & Push — Backend ───────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [tags]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-backend:${{ needs.tags.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-backend:${{ needs.tags.outputs.sha-tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Build & Push — Frontend ──────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [tags]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-frontend:${{ needs.tags.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-frontend:${{ needs.tags.outputs.sha-tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Publish GitHub Release (main only) ───────────────────────────────────────
  release:
    name: Publish GitHub Release
    if: github.ref_name == 'main'
    needs: [tags, build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Compile handbook (LaTeX)
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3
        with:
          root_file: handbook.tex
          working_directory: docs
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }} (${{ needs.tags.outputs.short-sha }})"
          body: |
            ## Commit

            ${{ github.event.head_commit.message }}

            **SHA:** [`${{ needs.tags.outputs.short-sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ## Docker Images

            ```bash
            # Backend
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-backend:${{ needs.tags.outputs.sha-tag }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-backend:latest

            # Frontend
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-frontend:${{ needs.tags.outputs.sha-tag }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/open-hybrid-cloud-frontend:latest
            ```

            See `infra/docker-host/docker-compose.yml` for the full Docker host deployment configuration.
          files: |
            docs/handbook.pdf
          draft: false
          prerelease: false
          make_latest: true

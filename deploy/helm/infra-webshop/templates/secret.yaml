apiVersion: v1
kind: Secret
metadata:
  name: {{ include "infra-webshop.fullname" . }}
  labels:
    {{- include "infra-webshop.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "env.databaseUrl is required" .Values.env.databaseUrl | quote }}
  SESSION_SECRET: {{ required "env.sessionSecret is required" .Values.env.sessionSecret | quote }}
  ADMIN_PASSWORD: {{ required "env.adminPassword is required" .Values.env.adminPassword | quote }}
  PORT: {{ .Values.env.port | quote }}
  APP_NAME: {{ .Values.env.appName | quote }}
  APP_SUBTITLE: {{ .Values.env.appSubtitle | quote }}
  ADMIN_EMAIL: {{ .Values.env.adminEmail | quote }}
  BASE_CURRENCY: {{ .Values.env.baseCurrency | quote }}
  {{- with .Values.env.entra }}
  {{- if .tenantId }}
  ENTRA_TENANT_ID: {{ .tenantId | quote }}
  ENTRA_CLIENT_ID: {{ .clientId | quote }}
  ENTRA_CLIENT_SECRET: {{ .clientSecret | quote }}
  ENTRA_REDIRECT_URL: {{ .redirectUrl | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.env.smtp }}
  {{- if .host }}
  SMTP_HOST: {{ .host | quote }}
  SMTP_PORT: {{ .port | quote }}
  SMTP_FROM: {{ .from | quote }}
  SMTP_USERNAME: {{ .username | quote }}
  SMTP_PASSWORD: {{ .password | quote }}
  SMTP_TLS: {{ .tls | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.env.ai }}
  AI_PROVIDER: {{ .provider | quote }}
  {{- if .endpoint }}
  AI_ENDPOINT: {{ .endpoint | quote }}
  AI_API_KEY: {{ .apiKey | quote }}
  AI_MODEL: {{ .model | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.env.exchangeRate }}
  {{- if .apiUrl }}
  EXCHANGE_RATE_API_URL: {{ .apiUrl | quote }}
  {{- end }}
  {{- if .apiKey }}
  EXCHANGE_RATE_API_KEY: {{ .apiKey | quote }}
  {{- end }}
  {{- end }}

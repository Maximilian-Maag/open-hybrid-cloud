# Docker host deployment — connects to real external systems via env vars.
# Configure apps/backend/.env and apps/frontend/.env before starting.
# Start with: docker compose -f infra/docker-compose.yml up -d

services:

  # ── Application ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: ohc-frontend
    env_file: ./docker-host/.env
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: ohc-backend
    env_file: ./docker-host/.env
    expose:
      - "3001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm db:migrate && pnpm start"
    networks:
      - app

  # ── Reverse proxy ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: ohc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app

  # ── Database ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ohc-postgres
    env_file: ./docker-host/.env
    environment:
      POSTGRES_DB: open_hybrid_cloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_hybrid_cloud"]
      interval: 2s
      timeout: 5s
      retries: 15
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
    driver: bridge

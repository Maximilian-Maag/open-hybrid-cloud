# Production deployment on a single Docker host.
# Prerequisites:
#   - docker login (to pull images from Docker Hub)
#   - .env filled in (see .env.example)
#   - nginx.conf in place (see nginx.conf.example)
#   - TLS certificates in ./certs/ (fullchain.pem + privkey.pem)

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: open-hybrid-cloud-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Next.js UI) ──────────────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME}/open-hybrid-cloud-frontend:${IMAGE_TAG:-latest}
    container_name: open-hybrid-cloud-frontend
    expose:
      - "3000"
    environment:
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      # Server-side URL for frontend → backend communication (internal network)
      API_URL: "http://backend:3001"
    depends_on:
      backend:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped
    # node:22-alpine has no curl — busybox wget is what's actually available.
    healthcheck:
      # 127.0.0.1, not localhost: this image's `localhost` resolves to ::1, but
      # the server only binds the IPv4 0.0.0.0 (HOSTNAME=0.0.0.0 above).
      # /api/ping, not /: unauthenticated requests to / redirect to NEXTAUTH_URL
      # (https://<public-domain>/login) and wget follows redirects, so it would
      # hit the same ::1 problem again trying to reach the *public* origin.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (Next.js API) ──────────────────────────────────────────────────────
  backend:
    image: ${DOCKERHUB_USERNAME}/open-hybrid-cloud-backend:${IMAGE_TAG:-latest}
    container_name: open-hybrid-cloud-backend
    expose:
      - "3001"
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/open_hybrid_cloud"
      JWT_SECRET: "${JWT_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      FRONTEND_URL: "${NEXTAUTH_URL}"
      EXCHANGE_RATE_API_URL: "${EXCHANGE_RATE_API_URL}"
      # Optional — Microsoft Entra ID (OIDC). Leave blank to disable.
      ENTRA_TENANT_ID: "${ENTRA_TENANT_ID:-}"
      ENTRA_CLIENT_ID: "${ENTRA_CLIENT_ID:-}"
      ENTRA_CLIENT_SECRET: "${ENTRA_CLIENT_SECRET:-}"
      ENTRA_REDIRECT_URI: "${ENTRA_REDIRECT_URI:-}"
      # Optional — SMTP. Leave blank to disable email.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_TLS: "${SMTP_TLS:-true}"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1, not localhost: this image's `localhost` resolves to ::1, but
      # the server only binds the IPv4 0.0.0.0 (HOSTNAME=0.0.0.0 above).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Database ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: open-hybrid-cloud-postgres
    environment:
      POSTGRES_DB: open_hybrid_cloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Auto-updater ───────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: open-hybrid-cloud-watchtower
    environment:
      DOCKER_API_VERSION: "1.47"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --cleanup --interval 300 --label-enable
    restart: unless-stopped

volumes:
  postgres_data:

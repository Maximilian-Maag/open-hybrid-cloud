{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "open-hybrid-cloud.fullname" . }}
  labels:
    {{- include "open-hybrid-cloud.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # API routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "open-hybrid-cloud.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
          # All other routes → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "open-hybrid-cloud.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}

{{- /* ── Frontend secret ─────────────────────────────────────────────────── */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-hybrid-cloud.frontend.fullname" . }}
  labels:
    {{- include "open-hybrid-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ required "frontend.secrets.nextauthSecret is required" .Values.frontend.secrets.nextauthSecret | quote }}
---
{{- /* ── Backend secret ──────────────────────────────────────────────────── */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-hybrid-cloud.backend.fullname" . }}
  labels:
    {{- include "open-hybrid-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  DATABASE_URL: {{ required "backend.secrets.databaseUrl is required" .Values.backend.secrets.databaseUrl | quote }}
  JWT_SECRET: {{ required "backend.secrets.jwtSecret is required" .Values.backend.secrets.jwtSecret | quote }}
  ADMIN_PASSWORD: {{ required "backend.secrets.adminPassword is required" .Values.backend.secrets.adminPassword | quote }}
  {{- with .Values.backend.env.smtp }}
  {{- if .pass }}
  SMTP_PASS: {{ .pass | quote }}
  {{- end }}
  {{- end }}

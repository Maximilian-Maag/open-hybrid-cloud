# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  replicaCount: 2

  image:
    repository: open-hybrid-cloud/frontend
    pullPolicy: IfNotPresent
    # Overrides Chart.appVersion when set
    tag: ""

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  env:
    nextauthUrl: "https://shop.example.com"
    # NEXT_PUBLIC_API_URL is baked in at build time; set via build args.
    # Runtime server-side API URL (container-internal)
    apiUrl: "http://open-hybrid-cloud-backend:3001"

  # Secrets — provide via --set or a separate secrets values file
  secrets:
    nextauthSecret: ""    # NEXTAUTH_SECRET  32+ random bytes

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  replicaCount: 2

  image:
    repository: open-hybrid-cloud/backend
    pullPolicy: IfNotPresent
    # Overrides Chart.appVersion when set
    tag: ""

  service:
    type: ClusterIP
    port: 3001

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  env:
    adminEmail: "admin@example.com"
    frontendUrl: "https://shop.example.com"
    exchangeRateApiUrl: "https://api.exchangerate.host/latest"

    # Optional — Microsoft Entra ID (OIDC)
    entra:
      tenantId: ""
      clientId: ""
      clientSecret: ""

    # Optional — SMTP
    smtp:
      host: ""
      port: "587"
      from: ""
      user: ""
      pass: ""
      tls: "true"

  # Secrets — provide via --set or a separate secrets values file
  secrets:
    databaseUrl: ""     # DATABASE_URL  postgresql://user:pass@host:5432/db
    jwtSecret: ""       # JWT_SECRET    32+ random bytes
    adminPassword: ""   # ADMIN_PASSWORD  initial admin account password

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: shop.example.com
  tls:
    - secretName: open-hybrid-cloud-tls
      hosts:
        - shop.example.com

# ── Database migration hook ───────────────────────────────────────────────────
migrate:
  # Run as a pre-install / pre-upgrade Helm hook via the backend image
  enabled: true

# ── Pod configuration (shared defaults) ──────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

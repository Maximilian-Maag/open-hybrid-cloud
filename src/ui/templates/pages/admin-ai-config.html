{{define "title"}}{{t "admin.ai_title" .Lang}}{{end}}
{{define "content"}}
<div class="mb-6">
    <a href="/admin" class="btn btn-ghost btn-sm mb-2">{{t "admin.back" .Lang}}</a>
    <h2 class="text-2xl font-bold">{{t "admin.ai_title" .Lang}}</h2>
    <p class="text-base-content/60 text-sm mt-1">{{t "admin.ai_subtitle" .Lang}}</p>
</div>

<div class="max-w-lg">
    {{with .Data}}
    <div class="card bg-base-100 border border-base-300">
        <div class="card-body">
            <form method="POST" action="/admin/ai-config" class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.ai_provider" $.Lang}}</span></label>
                    <select name="ai_provider" class="select select-bordered select-sm">
                        <option value="" {{if eq .AIConfig.AIProvider ""}}selected{{end}}>{{t "admin.ai_disabled" $.Lang}}</option>
                        <option value="claude" {{if eq .AIConfig.AIProvider "claude"}}selected{{end}}>Claude (Anthropic)</option>
                        <option value="openai" {{if eq .AIConfig.AIProvider "openai"}}selected{{end}}>OpenAI</option>
                        <option value="azure_openai" {{if eq .AIConfig.AIProvider "azure_openai"}}selected{{end}}>Azure OpenAI</option>
                        <option value="ollama" {{if eq .AIConfig.AIProvider "ollama"}}selected{{end}}>Ollama (local)</option>
                        <option value="localai" {{if eq .AIConfig.AIProvider "localai"}}selected{{end}}>LocalAI (local)</option>
                    </select>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.ai_endpoint" $.Lang}}</span></label>
                    <input type="url" name="ai_endpoint" class="input input-bordered input-sm"
                           value="{{.AIConfig.AIEndpoint}}"
                           placeholder="{{t "admin.ai_endpoint_hint" $.Lang}}" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.ai_api_key" $.Lang}}</span></label>
                    <input type="password" name="ai_api_key" class="input input-bordered input-sm"
                           placeholder="{{t "admin.ai_api_key_hint" $.Lang}}" autocomplete="new-password" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.ai_model" $.Lang}}</span></label>
                    <input type="text" name="ai_model" class="input input-bordered input-sm"
                           value="{{.AIConfig.AIModel}}"
                           placeholder="claude-haiku-4-5-20251001" />
                </div>
                <button type="submit" class="btn btn-primary btn-sm">{{t "common.save" $.Lang}}</button>
            </form>
        </div>
    </div>
    {{end}}
</div>
{{end}}

{{define "title"}}{{t "admin.smtp_title" .Lang}}{{end}}
{{define "content"}}
<div class="mb-6">
    <a href="/admin" class="btn btn-ghost btn-sm mb-2">{{t "admin.back" .Lang}}</a>
    <h2 class="text-2xl font-bold">{{t "admin.smtp_title" .Lang}}</h2>
    <p class="text-base-content/60 text-sm mt-1">{{t "admin.smtp_subtitle" .Lang}}</p>
</div>

<div class="max-w-lg">
    {{with .Data}}
    <div class="card bg-base-100 border border-base-300">
        <div class="card-body">
            <form method="POST" action="/admin/smtp" class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div class="form-control col-span-2">
                        <label class="label"><span class="label-text text-sm">{{t "admin.smtp_host" $.Lang}}</span></label>
                        <input type="text" name="smtp_host" class="input input-bordered input-sm"
                               value="{{.SMTPConfig.SMTPHost}}" placeholder="smtp.example.com" />
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text text-sm">{{t "admin.smtp_port" $.Lang}}</span></label>
                        <input type="text" name="smtp_port" class="input input-bordered input-sm"
                               value="{{.SMTPConfig.SMTPPort}}" placeholder="587" />
                    </div>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.smtp_from" $.Lang}}</span></label>
                    <input type="email" name="smtp_from" class="input input-bordered input-sm"
                           value="{{.SMTPConfig.SMTPFrom}}" placeholder="noreply@example.com" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.smtp_username" $.Lang}}</span></label>
                    <input type="text" name="smtp_username" class="input input-bordered input-sm"
                           value="{{.SMTPConfig.SMTPUsername}}" autocomplete="off" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.smtp_password" $.Lang}}</span></label>
                    <input type="password" name="smtp_password" class="input input-bordered input-sm"
                           placeholder="{{t "admin.smtp_password_hint" $.Lang}}" autocomplete="new-password" />
                </div>
                <div class="form-control">
                    <label class="label cursor-pointer gap-2 justify-start">
                        <input type="checkbox" name="smtp_tls" class="checkbox checkbox-sm"
                               {{if .SMTPConfig.SMTPTLS}}checked{{end}} />
                        <span class="label-text text-sm">{{t "admin.smtp_tls" $.Lang}}</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">{{t "common.save" $.Lang}}</button>
            </form>
        </div>
    </div>
    {{end}}
</div>
{{end}}

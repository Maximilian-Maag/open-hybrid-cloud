{{define "title"}}{{t "admin.edit_user" .Lang}}{{end}}
{{define "content"}}
<div class="mb-6">
    <a href="/admin/users" class="ds-btn-sm ds-btn-ghost mb-2">{{t "admin.back" .Lang}}</a>
    <h2 class="text-2xl font-bold">{{t "admin.edit_user" .Lang}}</h2>
</div>

{{with .Data}}
<div class="max-w-md">
    <div class="ds-card">
        <div class="ds-card-body">
            <form method="POST" action="/admin/users/{{.EditUser.ID}}/edit" class="space-y-3">
                <div class="ds-field">
                    <label for="edit-user-name" class="ds-label">{{t "common.name" $.Lang}}</label>
                    <input id="edit-user-name" type="text" name="name" class="ds-input"
                           value="{{.EditUser.Name}}" required />
                </div>
                <div class="ds-field">
                    <label for="edit-user-email" class="ds-label">E-Mail</label>
                    <input id="edit-user-email" type="email" name="email" class="ds-input"
                           value="{{.EditUser.Email}}" required />
                </div>
                <div class="ds-field">
                    <label for="edit-user-role" class="ds-label">{{t "admin.role" $.Lang}}</label>
                    <select id="edit-user-role" name="role" class="ds-select">
                        <option value="shop_admin" {{if eq (printf "%s" .EditUser.Role) "shop_admin"}}selected{{end}}>{{t "admin.role_admin" $.Lang}}</option>
                        <option value="admin" {{if eq (printf "%s" .EditUser.Role) "admin"}}selected{{end}}>{{t "admin.role_du" $.Lang}}</option>
                        <option value="project_leader" {{if eq (printf "%s" .EditUser.Role) "project_leader"}}selected{{end}}>{{t "admin.role_pl" $.Lang}}</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="ds-btn-sm ds-btn-primary">{{t "common.save" $.Lang}}</button>
                    <a href="/admin/users" class="ds-btn-sm ds-btn-ghost">{{t "common.cancel" $.Lang}}</a>
                </div>
            </form>
        </div>
    </div>

    {{if .EditUser.Active}}
    <div class="mt-4">
        <form method="POST" action="/admin/users/{{.EditUser.ID}}/deactivate"
              onsubmit="return confirm('{{t "admin.confirm_deactivate_user" $.Lang}}')">
            <button type="submit" class="ds-btn-sm ds-btn-danger-outline">{{t "admin.deactivate_user" $.Lang}}</button>
        </form>
    </div>
    {{else}}
    <div class="ds-alert-warning mt-4">
        <span>{{t "admin.user_inactive" $.Lang}}</span>
    </div>
    {{end}}
</div>
{{end}}
{{end}}

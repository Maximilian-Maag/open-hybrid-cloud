{{define "title"}}{{.Brand.Name}}{{end}}
{{define "content"}}
<div class="min-h-screen flex items-center justify-center bg-slate-50">
    <div class="bg-white rounded-xl border border-slate-200 shadow-xl w-full max-w-sm">
        <div class="ds-card-body">
            <h1 class="text-2xl font-bold text-center mb-2">{{.Brand.Name}}</h1>
            <p class="text-center text-slate-500 text-sm mb-4">{{.Brand.Subtitle}}</p>

            {{if .Data}}{{with .Data}}
            {{if .Error}}
            <div class="ds-alert-error text-sm mb-4">{{.Error}}</div>
            {{end}}

            {{if .OIDCEnabled}}
            <a href="/auth/start" class="ds-btn-md ds-btn-primary w-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.22C21 6.73 16.74 3 12 3c-4.69 0-9 3.65-9 9.28C3 16.93 7.14 21 12 21c.34 0 .67-.02 1-.06V17.5A5.5 5.5 0 1112 6.5a5.5 5.5 0 015 3.22C18.5 11.5 21 12 21 12.22z"/></svg>
                {{t "login.entra" $.Lang}}
            </a>
            <div class="relative flex items-center my-2"><div class="flex-1 border-t border-slate-200"></div><span class="mx-3 text-xs text-slate-400">{{t "login.or" $.Lang}}</span><div class="flex-1 border-t border-slate-200"></div></div>
            {{end}}
            {{end}}{{end}}

            <form method="POST" action="/login" class="space-y-4">
                <div class="ds-field">
                    <label for="login-email" class="ds-label">{{t "login.email" .Lang}}</label>
                    <input id="login-email" type="email" name="email" class="ds-input" required autofocus />
                </div>
                <div class="ds-field">
                    <label for="login-password" class="ds-label">{{t "login.password" .Lang}}</label>
                    <input id="login-password" type="password" name="password" class="ds-input" required />
                </div>
                <button type="submit" class="ds-btn-sm ds-btn-secondary w-full">{{t "login.submit" .Lang}}</button>
            </form>
        </div>
    </div>
</div>
{{end}}

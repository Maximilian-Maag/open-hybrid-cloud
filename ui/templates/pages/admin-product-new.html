{{define "title"}}{{t "admin.new_product" .Lang}}{{end}}
{{define "content"}}
<div class="mb-4">
    <a href="/admin/products" class="btn btn-ghost btn-sm">{{t "common.back" .Lang}}</a>
</div>
<h2 class="text-2xl font-bold mb-6">{{t "admin.new_product" .Lang}}</h2>

<form method="POST" action="/admin/products/new" class="max-w-lg space-y-4">
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">{{t "admin.categories" .Lang}} <span class="text-error">*</span></span></label>
        <select name="category_id" class="select select-bordered" required>
            <option value="">{{t "admin.choose" .Lang}}</option>
            {{with .Data}}{{range .Categories}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}{{end}}
        </select>
    </div>
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">{{t "admin.name_de" .Lang}} <span class="text-error">*</span></span></label>
        <input type="text" name="name" class="input input-bordered" required />
    </div>
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">{{t "admin.desc_de" .Lang}}</span></label>
        <textarea name="description" class="textarea textarea-bordered" rows="4"></textarea>
    </div>
    <div class="flex gap-3">
        <button type="submit" class="btn btn-primary">{{t "common.create" .Lang}}</button>
        <a href="/admin/products" class="btn btn-ghost">{{t "common.cancel" .Lang}}</a>
    </div>
</form>
{{end}}

{{define "title"}}{{t "admin.edit_user" .Lang}}{{end}}
{{define "content"}}
<div class="mb-6">
    <a href="/admin/users" class="btn btn-ghost btn-sm mb-2">{{t "admin.back" .Lang}}</a>
    <h2 class="text-2xl font-bold">{{t "admin.edit_user" .Lang}}</h2>
</div>

{{with .Data}}
<div class="max-w-md">
    <div class="card bg-base-100 border border-base-300">
        <div class="card-body">
            <form method="POST" action="/admin/users/{{.EditUser.ID}}/edit" class="space-y-3">
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "common.name" $.Lang}}</span></label>
                    <input type="text" name="name" class="input input-bordered input-sm"
                           value="{{.EditUser.Name}}" required />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">E-Mail</span></label>
                    <input type="email" name="email" class="input input-bordered input-sm"
                           value="{{.EditUser.Email}}" required />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "admin.role" $.Lang}}</span></label>
                    <select name="role" class="select select-bordered select-sm">
                        <option value="shop_admin" {{if eq (printf "%s" .EditUser.Role) "shop_admin"}}selected{{end}}>{{t "admin.role_admin" $.Lang}}</option>
                        <option value="admin" {{if eq (printf "%s" .EditUser.Role) "admin"}}selected{{end}}>{{t "admin.role_du" $.Lang}}</option>
                        <option value="project_leader" {{if eq (printf "%s" .EditUser.Role) "project_leader"}}selected{{end}}>{{t "admin.role_pl" $.Lang}}</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm">{{t "common.save" $.Lang}}</button>
                    <a href="/admin/users" class="btn btn-ghost btn-sm">{{t "common.cancel" $.Lang}}</a>
                </div>
            </form>
        </div>
    </div>

    {{if .EditUser.Active}}
    <div class="mt-4">
        <form method="POST" action="/admin/users/{{.EditUser.ID}}/deactivate"
              onsubmit="return confirm('{{t "admin.confirm_deactivate_user" $.Lang}}')">
            <button type="submit" class="btn btn-error btn-sm btn-outline">{{t "admin.deactivate_user" $.Lang}}</button>
        </form>
    </div>
    {{else}}
    <div class="alert alert-warning mt-4">
        <span>{{t "admin.user_inactive" $.Lang}}</span>
    </div>
    {{end}}
</div>
{{end}}
{{end}}

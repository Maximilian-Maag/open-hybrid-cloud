{{define "title"}}{{t "nav.impressum" .Lang}}{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{{t "nav.impressum" .Lang}}</h1>
    <div class="bg-white border border-gray-200 rounded-lg p-6">
        {{if .Brand.ImprintText}}
        <pre class="text-sm text-gray-700 whitespace-pre-wrap font-sans leading-relaxed">{{.Brand.ImprintText}}</pre>
        {{else}}
        <p class="text-sm text-gray-400">{{t "common.contact_admin" .Lang}}</p>
        {{end}}
    </div>
</div>
{{end}}

{{define "title"}}{{t "profile.title" .Lang}}{{end}}
{{define "content"}}
<div class="mb-6">
    <h2 class="text-2xl font-bold">{{t "profile.title" .Lang}}</h2>
    <p class="text-base-content/60 text-sm mt-1">{{t "profile.subtitle" .Lang}}</p>
</div>

<div class="max-w-md">
    <div class="card bg-base-100 border border-base-300">
        <div class="card-body">
            <h3 class="card-title text-base">{{t "profile.change_password" .Lang}}</h3>
            <form method="POST" action="/settings/profile" class="space-y-3">
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "profile.current_password" .Lang}}</span></label>
                    <input type="password" name="current_password" class="input input-bordered input-sm" required autocomplete="current-password" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "profile.new_password" .Lang}}</span></label>
                    <input type="password" name="new_password" class="input input-bordered input-sm" required minlength="8" autocomplete="new-password" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">{{t "profile.confirm_password" .Lang}}</span></label>
                    <input type="password" name="confirm_password" class="input input-bordered input-sm" required minlength="8" autocomplete="new-password" />
                </div>
                <button type="submit" class="btn btn-primary btn-sm">{{t "profile.save_password" .Lang}}</button>
            </form>
        </div>
    </div>
</div>
{{end}}

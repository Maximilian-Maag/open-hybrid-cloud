{{define "title"}}{{t "project.edit_title" .Lang}}{{end}}
{{define "content"}}
{{with .Data}}
<div class="mb-4">
    <a href="/projects" class="btn btn-ghost btn-sm">{{t "common.back" $.Lang}}</a>
</div>
<h2 class="text-2xl font-bold mb-6">{{t "project.edit_title" $.Lang}}</h2>

<form method="POST" action="/projects/{{.Project.ID}}" class="max-w-lg space-y-4">
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">{{t "common.name" $.Lang}} <span class="text-error">*</span></span></label>
        <input type="text" name="name" class="input input-bordered" value="{{.Project.Name}}" required />
    </div>
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">{{t "common.description" $.Lang}}</span></label>
        <textarea name="description" class="textarea textarea-bordered" rows="3">{{.Project.Description}}</textarea>
    </div>
    {{if .CostCenters}}
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">{{t "project.cost_center" $.Lang}}</span></label>
        <select name="cost_center_id" class="select select-bordered">
            <option value="">{{t "project.none_cc" $.Lang}}</option>
            {{range .CostCenters}}
            {{if .Active}}
            <option value="{{.ID}}" {{if eq .ID $.Project.CostCenterID}}selected{{end}}>{{.Code}} — {{.Name}}</option>
            {{end}}
            {{end}}
        </select>
    </div>
    {{end}}
    <div class="flex gap-3">
        <button type="submit" class="btn btn-primary">{{t "common.save" $.Lang}}</button>
        <a href="/projects" class="btn btn-ghost">{{t "common.cancel" $.Lang}}</a>
    </div>
</form>
{{end}}
{{end}}
